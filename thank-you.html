<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Museum of Culture</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="loading">
    <!-- Preloader -->
    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <div class="thank-you-screen">
        <div class="thank-you-card">
            <div class="check-icon"><i class="fas fa-check-circle"></i></div>
            <h1>Thank You!</h1>
            <p>Your visit notification has been sent successfully. We look forward to welcoming you to the Museum of Culture.</p>
            
            <button id="generate-qr-btn" class="btn" style="background: #5d4e37; margin-bottom: 15px;">Generate QR Code</button>

            <div id="qr-container" style="margin: 20px 0; display: none;">
                <div id="qr-code"></div>
                <button id="download-qr" class="btn" style="margin-top: 15px; background: #2c3e50; font-size: 0.9rem;"><i class="fas fa-download"></i> Download QR Code</button>
            </div>

            <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
                <a href="index.html" class="btn">Return to Home</a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
